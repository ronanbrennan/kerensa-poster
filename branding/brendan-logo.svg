<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" role="img"
     aria-label="For rent or for sale to the film industry">
  <defs>
    <path id="brendan-top" d="M 22.5,120 A 97.5,97.5 0 0 1 217.5,120"/>
    <path id="brendan-bot" d="M 10,120 A 110,110 0 0 0 230,120"/>
  </defs>
  <g fill="#2E3B2C" stroke="#2E3B2C">
    <!-- rings -->
    <circle cx="120" cy="120" r="116" fill="none" stroke-width="3"/>
    <circle cx="120" cy="120" r="90"  fill="none" stroke-width="2.5"/>

    <!-- curved wordmark -->
    <g stroke="none" font-family="Georgia, 'Times New Roman', serif"
       font-weight="700" text-anchor="middle">
      <text font-size="16.8" letter-spacing="0"><textPath href="#brendan-top" startOffset="50%">ART FOR RENT OR FOR SALE</textPath></text>
      <text font-size="19.5" letter-spacing="1.85"><textPath href="#brendan-bot" startOffset="50%">TO THE FILM INDUSTRY</textPath></text>
    </g>

    <!-- side ornaments where the two arcs meet — diamonds centred in the band
         between the rings (radius 103 = midpoint of r90 and r116) -->
    <g stroke="none">
      <path d="M 17,114 l 6,6 l -6,6 l -6,-6 z"/>
      <path d="M 223,114 l 6,6 l -6,6 l -6,-6 z"/>
    </g>

    <!-- movie camera — enlarged ~35% and recentred on the badge centre so it
         fills more of the inner circle. (bbox centre was ~130,115.5) -->
    <g transform="translate(120 120) scale(1.35) translate(-130 -115.5)">
      <!-- body -->
      <rect x="88" y="112" width="60" height="40" rx="4" stroke="none"/>
      <!-- lens horn -->
      <path d="M 148,120 L 172,109 L 172,143 L 148,134 Z" stroke="none"/>
      <!-- foot -->
      <rect x="102" y="152" width="34" height="6" rx="2" stroke="none"/>
      <rect x="115" y="158" width="8" height="6" stroke="none"/>
      <!-- reels: rings + hub + spokes -->
      <g fill="none" stroke-width="4">
        <circle cx="106" cy="98" r="15"/>
        <circle cx="140" cy="88" r="21"/>
      </g>
      <g stroke="none">
        <circle cx="106" cy="98" r="4"/>
        <circle cx="140" cy="88" r="5"/>
      </g>
      <g stroke-width="3">
        <line x1="106" y1="85" x2="106" y2="111"/>
        <line x1="93"  y1="98" x2="119" y2="98"/>
        <line x1="97"  y1="89" x2="115" y2="107"/>
        <line x1="115" y1="89" x2="97"  y2="107"/>
        <line x1="140" y1="69" x2="140" y2="107"/>
        <line x1="121" y1="88" x2="159" y2="88"/>
        <line x1="127" y1="75" x2="153" y2="101"/>
        <line x1="153" y1="75" x2="127" y2="101"/>
      </g>
    </g>
  </g>
</svg>
